AWSTemplateFormatVersion: "2010-09-09"
Description: Proyecto DevOps - EC2 + S3 para Web App

Resources:

  MyBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: devops-project-bucket-logs-123456

  MySecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP, SSH and App ports
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0

        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          CidrIp: 0.0.0.0/0

        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: 0.0.0.0/0

  MyEC2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t2.micro
      ImageId: ami-0c02fb55956c7d316  # Amazon Linux 2 (región us-east-1)
      SecurityGroups:
        - !Ref MySecurityGroup
      Tags:
        - Key: Name
          Value: DevOps-Project-EC2

Outputs:
  InstancePublicIP:
    Description: IP pública de la EC2
    Value: !GetAtt MyEC2Instance.PublicIp
